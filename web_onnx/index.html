<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lucida ONNX WebGPU Test</title><script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.webgpu.min.js"></script>
<style>:root{--bg:#0d1016;--panel:#171b24;--border:#30394b;--text:#edf0f7;--muted:#94a0b8;--accent:#7d9dff;--ok:#59db91;--error:#ff7e86}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI",sans-serif;min-height:100vh;padding:32px 18px}main{width:min(980px,100%);margin:auto}h1{margin:0;font-size:1.8rem}h1 span{color:var(--accent)}.lead,.meta,.detail{color:var(--muted)}.notice{background:#211f17;border:1px solid #5c522d;border-radius:10px;padding:12px 15px;color:#d9c989;margin:18px 0}.toolbar,.status,.drop,.result,.logs{background:var(--panel);border:1px solid var(--border);border-radius:13px}.toolbar{padding:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}button{border:0;border-radius:8px;background:var(--accent);color:#0c1020;font-weight:700;padding:10px 17px;cursor:pointer}button:disabled{opacity:.45}.status{margin-top:14px;padding:16px;display:flex;gap:13px}.spinner{width:22px;height:22px;border:3px solid #36415a;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}.status.idle .spinner,.status.ready .spinner,.status.done .spinner,.status.error .spinner{display:none}@keyframes spin{to{transform:rotate(360deg)}}.status.ready #statusTitle,.status.done #statusTitle{color:var(--ok)}.status.error #statusTitle{color:var(--error)}#statusTitle{font-weight:700}.detail{font-size:.88rem;margin-top:4px}.drop{margin-top:14px;padding:42px 20px;text-align:center;color:var(--muted);cursor:pointer;border-style:dashed}.drop.disabled{opacity:.45}.drop strong{color:var(--text)}#file{display:none}.result{margin-top:14px;padding:16px;display:none}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}canvas{width:100%;max-height:58vh;object-fit:contain;border-radius:9px;background:conic-gradient(#39404c 0 25%,#252a33 0 50%,#39404c 0 75%,#252a33 0) 0 0/22px 22px}.actions{margin-top:14px;display:flex;gap:12px;align-items:center}.logs{margin-top:14px;padding:16px}.logs h2{font-size:1rem;margin:0 0 10px}.logs pre{margin:0;background:#090b10;color:#b9c8e8;border-radius:8px;padding:12px;max-height:320px;overflow:auto;white-space:pre-wrap;font:12px/1.55 Consolas,monospace}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><h1><span>Lucida</span> ONNX WebGPU Test</h1><p class="lead">Python推論サーバーを使わず、ブラウザのGPUだけで処理する試験画面です。</p><div class="notice">1024×1024 FP16（GridSampleのみFP32）/ WebGPU専用試験版です。ChromeまたはEdgeの最新版と、十分なGPUメモリが必要です。CPUへのフォールバックは行いません。</div><div class="toolbar"><button id="loadModel" data-testid="load-model">1024 FP16モデルを読み込む</button><span class="meta" id="modelMeta">WebGPUを確認中...</span></div><div class="status idle" id="status"><div class="spinner"></div><div><div id="statusTitle">待機中</div><div class="detail" id="statusDetail">WebGPUを確認しています。</div></div></div><div class="drop disabled" id="drop" data-testid="drop-zone"><strong>画像をドラッグ＆ドロップ</strong> またはクリックして選択</div><input id="file" type="file" accept="image/*"><section class="result" id="result"><div class="grid"><div><h2>入力</h2><canvas id="inputPreview"></canvas></div><div><h2>背景除去結果</h2><canvas id="output"></canvas></div></div><div class="actions"><button id="save">PNGを保存</button><span class="meta" id="timing"></span></div></section><section class="logs"><h2>診断ログ</h2><pre id="logOutput"></pre></section><canvas id="work" width="1024" height="1024" hidden></canvas></main><script src="app.js"></script></body></html>
